<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المدرسة</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
</head>

<body>

<!-- Header -->
<header class="bg-primary text-white text-center py-4">
    <h2>🎓 بوابة المدرسة</h2>
    <p>منصة تعليمية متكاملة</p>
</header>

<div class="container my-4">

    <!-- Buttons -->
    <div class="text-center mb-4">
        <button class="btn btn-primary m-1" onclick="loginUI()">🔐 دخول المشرف</button>
        <button class="btn btn-success m-1" onclick="showStudents()">📊 عرض النتيجة</button>
    </div>

    <!-- Upload -->
    <div class="card p-3 mb-4">
        <h5>📁 رفع ملف</h5>
        <input type="file" id="fileInput" class="form-control mb-2">
        <button class="btn btn-warning w-100" onclick="handleUpload()">رفع</button>
    </div>

    <!-- Content -->
    <div id="content"></div>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3">
    <small>© 2026 جميع الحقوق محفوظة</small>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS Files -->
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/students.js"></script>
<script src="js/files.js"></script>
<script src="js/app.js"></script>

<!-- Script بسيط للرفع -->
<script>
function handleUpload() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) {
        alert("اختر ملف أولاً");
        return;
    }
    uploadFile(file);
}
</script>

</body>
</html>
